<!DOCTYPE html>
<html>
<body style="margin:0;background:#0a1a2f;color:white;font-family:sans-serif">

<canvas id="c"></canvas>

<script>
let c=document.getElementById("c");
let x=c.getContext("2d");

function draw(){

c.width=innerWidth;
c.height=innerHeight;

// خلفية
x.fillStyle="#0a1a2f";
x.fillRect(0,0,c.width,c.height);

// ===== RW01 =====
x.fillStyle="#333";
x.fillRect(200,300,800,40);
x.fillStyle="white";
x.fillText("RW01 (Arrival + Departure)",450,290);

// ===== RW10 =====
x.fillStyle="#555";
x.fillRect(1100,300,500,40);
x.fillStyle="white";
x.fillText("RW10 (Arrival)",1250,290);

// ===== Terminal =====
x.fillStyle="#999";
x.fillRect(50,250,150,150);
x.fillStyle="black";
x.fillText("TERMINAL",70,330);

// ===== L Gates =====
for(let i=0;i<4;i++){
  x.fillStyle="green";
  x.fillRect(250,250+i*35,40,25);
  x.fillStyle="white";
  x.fillText("L"+(i+1),255,265+i*35);
}

// ===== B Gates =====
for(let i=0;i<5;i++){
  x.fillStyle="yellow";
  x.fillRect(400+i*80,380,40,25);
  x.fillStyle="black";
  x.fillText("B"+(i+1),405+i*80,395);
}

// ===== M Gates =====
for(let i=0;i<4;i++){
  x.fillStyle="purple";
  x.fillRect(1150+i*80,380,40,25);
  x.fillStyle="white";
  x.fillText("M"+(i+1),1155+i*80,395);
}

// ===== A Runways =====
for(let i=0;i<4;i++){
  x.fillStyle="#777";
  x.fillRect(100+i*80,450,50,120);
  x.fillStyle="white";
  x.fillText("A"+(i+1),110+i*80,580);
}

// ===== Tower =====
x.fillStyle="orange";
x.fillRect(1500,150,40,120);
x.fillStyle="white";
x.fillText("TOWER",1485,140);

// ===== Taxiways =====
x.strokeStyle="cyan";
x.lineWidth=3;

x.beginPath();
x.moveTo(1100,320);
x.lineTo(900,320);
x.lineTo(700,360);
x.lineTo(500,360);
x.lineTo(300,320);
x.stroke();

}

draw();
</script>

</body>
</html>
