<!DOCTYPE html><html><body style="margin:0">
<canvas id="c"></canvas>
<script>
let c=document.getElementById("c");
let x=c.getContext("2d");

let planes=[
 {x:900,y:420,state:"landing"},
 {x:100,y:300,state:"takeoff"},
 {x:480,y:260,state:"taxi"},
];

function drawPlane(p){
 x.fillStyle="#fff";
 x.fillRect(p.x,p.y,30,8);
 x.fillRect(p.x+8,p.y-6,14,20);
}

function draw(){
 c.width=innerWidth;
 c.height=innerHeight;

// خلفية
x.fillStyle="#0a1a2f";
x.fillRect(0,0,c.width,c.height);

// RW01
x.fillStyle="#2c3e50";
x.fillRect(100,300,800,50);

// RW10
x.fillStyle="#34495e";
x.fillRect(100,420,800,30);

// تاكسي
x.fillStyle="#5d6d7e";
x.fillRect(480,250,20,300);

// تيرمنال
x.fillStyle="#3498db";
x.fillRect(400,150,200,100);

// بوابات
for(let i=0;i<5;i++){
 x.fillStyle="#5dade2";
 x.fillRect(420+i*35,120,20,30);
}

// M
for(let i=0;i<4;i++){
 x.fillStyle="#af7ac5";
 x.fillRect(420+i*35,460,20,30);
}

// حركة الطيارات
planes.forEach(p=>{
 if(p.state=="landing"){
   p.x-=3;
   if(p.x<500){p.state="taxi";p.y=350;}
 }
 else if(p.state=="taxi"){
   p.y+=2;
   if(p.y>460){p.state="park";p.x=420;}
 }
 else if(p.state=="takeoff"){
   p.x+=4;
   if(p.x>900)p.x=100;
 }
 drawPlane(p);
});

requestAnimationFrame(draw);
}

draw();
</script></body></html>
