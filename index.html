<!DOCTYPE html>
<html>
<body style="margin:0;background:#0a1a2f;overflow:hidden">

<canvas id="c"></canvas>

<script>
let c=document.getElementById("c");
let x=c.getContext("2d");

function drawMap(){

  c.width=innerWidth;
  c.height=innerHeight;

  // خلفية
  x.fillStyle="#0a1a2f";
  x.fillRect(0,0,c.width,c.height);

  // ===== RW01 =====
  x.fillStyle="#333";
  x.fillRect(200,250,800,40);

  x.fillStyle="red";
  for(let i=0;i<800;i+=40){
    x.fillRect(200+i,270,20,5);
  }

  // ===== RW10 =====
  x.fillStyle="#444";
  x.fillRect(1000,250,400,40);

  // ===== Terminal =====
  x.fillStyle="#aaa";
  x.fillRect(100,200,200,150);

  // ===== L Gates =====
  for(let i=0;i<4;i++){
    x.fillStyle="green";
    x.fillRect(300,200+i*30,40,20);
  }

  // ===== M Gates =====
  for(let i=0;i<4;i++){
    x.fillStyle="purple";
    x.fillRect(1100+i*60,320,40,20);
  }

  // ===== B Gates =====
  for(let i=0;i<5;i++){
    x.fillStyle="yellow";
    x.fillRect(900+i*60,400,40,20);
  }

  // ===== A Runways =====
  for(let i=0;i<4;i++){
    x.fillStyle="#666";
    x.fillRect(100+i*70,450,50,100);
  }

}

// ✈️ الطيارة
let plane={x:1400,y:270};

function movePlane(){

  plane.x-=2;

  if(plane.x<200){
    plane.x=1400;
  }

}

// تشغيل
function loop(){
  drawMap();

  movePlane();

  x.fillStyle="white";
  x.fillRect(plane.x,plane.y,20,8);

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
