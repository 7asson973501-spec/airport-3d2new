<!DOCTYPE html><html><body style="margin:0;background:#0a1a2f">
<canvas id="c"></canvas>
<div id="ui" style="position:absolute;top:10px;left:10px;color:white;font-family:sans-serif"></div>

<script>
// 🔐 login
let id=prompt("ID:"),pass=prompt("PASS:");
if(id!="36144554"||pass!="h36144554"){
 document.body.innerHTML="<h1 style='color:white;text-align:center'>Denied</h1>";throw"";
}

let c=document.getElementById("c"),x=c.getContext("2d"),ui=document.getElementById("ui");

// كاميرا (تحريك)
let camX=0,camY=0,zoom=1;

// عناصر
let objs=[
 {n:"RW01",x:100,y:300,w:900,h:60},
 {n:"RW10",x:100,y:420,w:900,h:40},
 {n:"Terminal",x:450,y:150,w:300,h:120},
 {n:"Arrival",x:450,y:550,w:300,h:60}
];

// طيارات
let planes=[
 {x:900,y:420,s:"landing",g:"M1"},
 {x:100,y:300,s:"takeoff",g:"B2"},
];

// ضغط
c.onclick=e=>{
 let mx=(e.clientX/zoom)+camX,my=(e.clientY/zoom)+camY;
 objs.forEach(o=>{
  if(mx>o.x&&mx<o.x+o.w&&my>o.y&&my<o.y+o.h){
   ui.innerText="Clicked: "+o.n;
  }
 });
};

// تحريك الكاميرا
window.onkeydown=e=>{
 if(e.key=="ArrowRight")camX+=50;
 if(e.key=="ArrowLeft")camX-=50;
 if(e.key=="ArrowUp")camY-=50;
 if(e.key=="ArrowDown")camY+=50;
 if(e.key=="+")zoom+=0.1;
 if(e.key=="-")zoom-=0.1;
};

function draw(){
c.width=innerWidth;c.height=innerHeight;
x.setTransform(zoom,0,0,zoom,-camX*zoom,-camY*zoom);

// خلفية
x.fillStyle="#0a1a2f";x.fillRect(0,0,2000,2000);

// مدارج
x.fillStyle="#333";x.fillRect(100,300,900,60);
x.fillStyle="#444";x.fillRect(100,420,900,40);

// تيرمنال
x.fillStyle="#1e90ff";x.fillRect(450,150,300,120);

// بوابات B
for(let i=0;i<5;i++){
 x.fillStyle="#00bfff";
 x.fillRect(480+i*50,120,30,40);
}

// بوابات M
for(let i=0;i<4;i++){
 x.fillStyle="#ff00ff";
 x.fillRect(480+i*50,480,30,40);
}

// طيارات
planes.forEach(p=>{
 if(p.s=="landing"){
  p.x-=3;
  if(p.x<500){p.s="taxi";p.y=350;}
 }
 else if(p.s=="taxi"){
  p.y+=2;
  if(p.y>500){p.s="park";}
 }
 else if(p.s=="takeoff"){
  p.x+=4;
  if(p.x>1000)p.x=100;
 }

 x.fillStyle="#fff";
 x.fillRect(p.x,p.y,30,8);
 x.fillRect(p.x+8,p.y-6,14,20);

 x.fillStyle="yellow";
 x.fillText(p.g,p.x,p.y-5);
});

requestAnimationFrame(draw);
}
draw();
</script></body></html>
