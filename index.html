<!DOCTYPE html><html><body style=margin:0>
<canvas id=c></canvas>
<script>
let x=c.getContext("2d"),t=0;
function d(){
c.width=innerWidth;c.height=innerHeight;
x.fillStyle="#000";x.fillRect(0,0,c.width,c.height);

// runway
x.fillStyle="#444";x.fillRect(50,200,600,20);

// terminal
x.fillStyle="#0af";x.fillRect(250,150,120,60);

// plane moving
x.fillStyle="#fff";
x.fillRect(50+t,180,20,10);

t+=2;if(t>600)t=0;

requestAnimationFrame(d)}
d();
</script></body></html>
