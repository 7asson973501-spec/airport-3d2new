<!DOCTYPE html><html><body style="margin:0">
<canvas id=c></canvas>
<script>
let x=c.getContext("2d"),t=0;

function d(){
c.width=innerWidth;c.height=innerHeight;

// خلفية
x.fillStyle="#0a0a0a";
x.fillRect(0,0,c.width,c.height);

// ===== RUNWAY =====
x.fillStyle="#444";
x.fillRect(50,300,900,40);

// خطوط المدرج
x.strokeStyle="#fff";
x.setLineDash([30,20]);
x.beginPath();
x.moveTo(50,320);
x.lineTo(950,320);
x.stroke();

// ===== TERMINAL =====
x.fillStyle="#0af";
x.fillRect(400,150,200,100);

// ===== GATES =====
for(let i=0;i<6;i++){
x.fillStyle="#0ff";
x.fillRect(420+i*30,120,20,30);
}

// ===== CONTROL TOWER =====
x.fillStyle="#aaa";
x.fillRect(700,150,25,80);

// ===== PLANE (شكل أوضح) =====
let px=100+t, py=280;

x.fillStyle="#fff";

// جسم الطيارة
x.fillRect(px,py,40,10);

// جناح
x.fillRect(px+10,py-10,20,30);

// مقدمة
x.beginPath();
x.moveTo(px+40,py);
x.lineTo(px+55,py+5);
x.lineTo(px+40,py+10);
x.closePath();
x.fill();

t+=4;
if(t>900)t=0;

requestAnimationFrame(d);
}

d();
</script></body></html>
