<!DOCTYPE html>
<html>
<body style="margin:0">
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a1a2f);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// إضاءة
scene.add(new THREE.AmbientLight(0xffffff,1));

// أرضية كبيرة
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(2000,2000),
 new THREE.MeshBasicMaterial({color:0x1a1a1a})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== RW01 =====
const rw01=new THREE.Mesh(
 new THREE.BoxGeometry(800,5,40),
 new THREE.MeshBasicMaterial({color:0x333333})
);
rw01.position.set(0,2,0);
scene.add(rw01);

// ===== RW10 =====
const rw10=new THREE.Mesh(
 new THREE.BoxGeometry(800,5,40),
 new THREE.MeshBasicMaterial({color:0x444444})
);
rw10.position.set(600,2,0);
scene.add(rw10);

// ===== L1-L4 (لاصقة RW01) =====
for(let i=0;i<4;i++){
 let l=new THREE.Mesh(
  new THREE.BoxGeometry(40,3,20),
  new THREE.MeshBasicMaterial({color:0x00ff00})
 );
 l.position.set(-200+i*100,3,40);
 scene.add(l);
}

// ===== Terminal =====
const terminal=new THREE.Mesh(
 new THREE.BoxGeometry(200,20,100),
 new THREE.MeshBasicMaterial({color:0x0077ff})
);
terminal.position.set(-300,10,0);
scene.add(terminal);

// ===== A1-A4 =====
for(let i=0;i<4;i++){
 let a=new THREE.Mesh(
  new THREE.BoxGeometry(40,3,20),
  new THREE.MeshBasicMaterial({color:0xaaaaaa})
 );
 a.position.set(-300+i*60,3,-80);
 scene.add(a);
}

// ===== B Gates =====
for(let i=0;i<5;i++){
 let b=new THREE.Mesh(
  new THREE.BoxGeometry(30,3,20),
  new THREE.MeshBasicMaterial({color:0x00ffff})
 );
 b.position.set(100+i*60,3,40);
 scene.add(b);
}

// ===== M Gates =====
for(let i=0;i<4;i++){
 let m=new THREE.Mesh(
  new THREE.BoxGeometry(30,3,20),
  new THREE.MeshBasicMaterial({color:0xff00ff})
 );
 m.position.set(600+i*60,3,-80);
 scene.add(m);
}

// ===== برج المراقبة =====
const tower=new THREE.Mesh(
 new THREE.BoxGeometry(20,60,20),
 new THREE.MeshBasicMaterial({color:0xffff00})
);
tower.position.set(700,30,100);
scene.add(tower);

// ===== طيارة =====
function createPlane(x,z){
 let p=new THREE.Mesh(
  new THREE.BoxGeometry(20,5,5),
  new THREE.MeshBasicMaterial({color:0xffffff})
 );
 p.position.set(x,10,z);
 p.state="landingRW10";
 return p;
}

let planes=[createPlane(900,0)];

// ===== الحركة الواقعية =====
function updatePlanes(){
 planes.forEach(p=>{
  
  // هبوط RW10
  if(p.state=="landingRW10"){
    p.position.x-=2;
    if(p.position.x<650){
      p.state="toM";
    }
  }

  // الى M
  else if(p.state=="toM"){
    p.position.z-=1;
    if(p.position.z<-80){
      p.state="parkM";
      p.wait=0;
    }
  }

  // توقف
  else if(p.state=="parkM"){
    p.wait++;
    if(p.wait>200){
      p.state="toRW01";
    }
  }

  // الى RW01
  else if(p.state=="toRW01"){
    p.position.z+=1;
    p.position.x-=1;
    if(p.position.x<0){
      p.state="takeoff";
    }
  }

  // إقلاع RW01
  else if(p.state=="takeoff"){
    p.position.x+=3;
    if(p.position.x>900){
      p.position.set(900,10,0);
      p.state="landingRW10";
    }
  }

 });
}

// كاميرا
camera.position.set(0,500,700);
camera.lookAt(0,0,0);

// تشغيل
function animate(){
 requestAnimationFrame(animate);
 updatePlanes();
 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
