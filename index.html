<!DOCTYPE html><html><body style="margin:0">
<canvas id=c></canvas>
<script>
let x=c.getContext("2d");

// طيارات
let planes=[
 {x:900,y:420,state:"landing"},
 {x:100,y:300,state:"takeoff"},
 {x:480,y:260,state:"taxi"},
];

// رسم الطيارة
function plane(p){
 x.fillStyle="#fff";
 x.fillRect(p.x,p.y,30,8);
 x.fillRect(p.x+8,p.y-6,14,20);
}

// رسم
function d(){
 c.width=innerWidth;c.height=innerHeight;

// خلفية
x.fillStyle="#0a0a0a";
x.fillRect(0,0,c.width,c.height);

// ===== RW01 =====
x.fillStyle="#333";
x.fillRect(100,300,800,50);

// ===== RW10 =====
x.fillStyle="#444";
x.fillRect(100,420,800,30);

// خطوط
x.strokeStyle="#fff";
x.setLineDash([20,10]);
x.beginPath();
x.moveTo(100,325);x.lineTo(900,325);
x.moveTo(100,435);x.lineTo(900,435);
x.stroke();

// ===== A1–A4 =====
for(let i=0;i<4;i++){
 x.fillStyle="#555";
 x.fillRect(120+i*80,500,60,15);
 x.fillStyle="#fff";
 x.fillText("A"+(i+1),130+i*80,495);
}

// ===== TERMINAL =====
x.fillStyle="#0af";
x.fillRect(400,150,200,100);

// ===== B GATES =====
for(let i=0;i<5;i++){
 x.fillStyle="#0ff";
 x.fillRect(420+i*35,120,20,30);
 x.fillStyle="#fff";
 x.fillText("B"+(i+1),420+i*35,115);
}

// ===== T1,T2 =====
x.fillStyle="#ff0";
x.fillRect(350,300,20,40);
x.fillRect(650,300,20,40);
x.fillStyle="#fff";
x.fillText("T1",350,295);
x.fillText("T2",650,295);

// ===== M GATES =====
for(let i=0;i<4;i++){
 x.fillStyle="#f0f";
 x.fillRect(420+i*35,460,20,30);
 x.fillStyle="#fff";
 x.fillText("M"+(i+1),420+i*35,455);
}

// ===== ARRIVAL HALL =====
x.fillStyle="#999";
x.fillRect(400,520,200,50);

// ===== TAXIWAY =====
x.fillStyle="#666";
x.fillRect(480,250,20,300);

// ===== CONTROL TOWER =====
x.fillStyle="#aaa";
x.fillRect(700,150,25,80);

// ===== حركة الطيارات =====
planes.forEach(p=>{
 if(p.state=="landing"){
   p.x-=3;
   if(p.x<500){p.state="taxi";p.y=350;}
 }
 else if(p.state=="taxi"){
   p.y+=2;
   if(p.y>460){p.state="park";p.x=420;}
 }
 else if(p.state=="park"){
   // واقفة عند M
 }
 else if(p.state=="takeoff"){
   p.x+=4;
   if(p.x>900)p.x=100;
 }
 plane(p);
});

requestAnimationFrame(d);
}
d();
</script></body></html>
