<!DOCTYPE html><html><body style="margin:0">
<canvas id=c></canvas>
<script>
let x=c.getContext("2d");

// طيارات
let planes=[
 {x:-100,y:280,type:"takeoff"},
 {x:1000,y:380,type:"landing"},
 {x:400,y:120,type:"taxi"},
];

// رسم الطيارة
function drawPlane(p){
 x.fillStyle="#fff";
 x.fillRect(p.x,p.y,30,8);
 x.fillRect(p.x+8,p.y-6,14,20);
}

// رسم
function d(){
 c.width=innerWidth;c.height=innerHeight;

// خلفية
x.fillStyle="#0a0a0a";
x.fillRect(0,0,c.width,c.height);

// ===== RUNWAYS =====
x.fillStyle="#444";
x.fillRect(50,280,900,40); // RW01
x.fillRect(50,380,900,30); // RW10

// خطوط
x.strokeStyle="#fff";
x.setLineDash([20,15]);
x.beginPath();
x.moveTo(50,300);x.lineTo(950,300);
x.moveTo(50,395);x.lineTo(950,395);
x.stroke();

// ===== TERMINAL =====
x.fillStyle="#0af";
x.fillRect(400,150,200,100);

// ===== GATES =====
for(let i=0;i<6;i++){
 x.fillStyle="#0ff";
 x.fillRect(420+i*30,120,20,30);
}

// ===== TAXIWAY =====
x.fillStyle="#666";
x.fillRect(480,250,20,130);

// ===== حركة الطيارات =====
planes.forEach(p=>{
 if(p.type=="takeoff"){
   p.x+=3; // إقلاع
   if(p.x>1000)p.x=-100;
 }
 if(p.type=="landing"){
   p.x-=2; // هبوط
   if(p.x<200){p.type="taxi";p.y=260;}
 }
 if(p.type=="taxi"){
   p.y+=1; // يمشي للتيرمنال
   if(p.y>320){p.y=320;}
 }
 drawPlane(p);
});

requestAnimationFrame(d);
}
d();
</script></body></html>
