<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airport Map</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

/* الصورة (المطار) */
#map{
  position:relative;
  width:100%;
  height:100vh;
}

#map img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

/* الطيارة */
.plane{
  position:absolute;
  width:14px;
  height:14px;
  background:red;
  border-radius:50%;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="map">
  <!-- لازم اسم الصورة يكون map.png -->
  <img src="map.png">
  
  <!-- الطيارة -->
  <div id="plane" class="plane"></div>
</div>

<script>
let plane=document.getElementById("plane");

/* مسار مؤقت (نعدله لاحقًا حسب الخط الأزرق) */
let path=[
  {x:90,y:50},  // RW10
  {x:80,y:50},
  {x:70,y:55},
  {x:60,y:60},  // باتجاه M
  {x:50,y:60},
  {x:40,y:55},
  {x:30,y:50},  // RW01
  {x:20,y:50}
];

let i=0;

function move(){
  let p=path[i];

  plane.style.left=p.x+"%";
  plane.style.top=p.y+"%";

  i++;
  if(i>=path.length)i=0;

  setTimeout(move,400);
}

move();
</script>

</body>
</html>
