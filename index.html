<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airport Map</title>
<style>
body{margin:0;background:black;overflow:hidden}
#map{
  position:absolute;
  width:100%;
  height:100%;
  background:url('map.png') no-repeat center center;
  background-size:contain;
}
.plane{
  position:absolute;
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="plane" class="plane"></div>

<script>
let plane=document.getElementById("plane");

// مسار الطيارة (تقدر نعدله لاحقًا بدقة حسب الصورة)
let path=[
  {x:90,y:50},   // RW10
  {x:70,y:50},
  {x:50,y:60},
  {x:40,y:70},   // M gates
  {x:30,y:60},
  {x:20,y:50},   // RW01
  {x:10,y:50}
];

let i=0;

function move(){
  let p=path[i];
  plane.style.left=p.x+"%";
  plane.style.top=p.y+"%";

  i++;
  if(i>=path.length) i=0;

  setTimeout(move,500);
}

move();
</script>

</body>
</html>
