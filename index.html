<!DOCTYPE html><html><head><meta charset="utf-8">
<title>Airport 3D Pro</title>
<style>body{margin:0;overflow:hidden;background:#0b0f1a}</style>
</head><body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script>
const s=new THREE.Scene();s.background=new THREE.Color(0x0b0f1a);
const c=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
c.position.set(0,30,60);
const r=new THREE.WebGLRenderer({antialias:true});r.setSize(innerWidth,innerHeight);
document.body.appendChild(r.domElement);
new THREE.OrbitControls(c,r.domElement);

// lights
const d=new THREE.DirectionalLight(0xffffff,1);d.position.set(30,50,30);s.add(d);
s.add(new THREE.AmbientLight(0xffffff,.5));

// ground
const g=new THREE.Mesh(new THREE.PlaneGeometry(300,300),
 new THREE.MeshStandardMaterial({color:0x1a1f2b}));
g.rotation.x=-Math.PI/2;s.add(g);

// runways
function runway(z,name){
 const m=new THREE.Mesh(new THREE.BoxGeometry(120,0.2,6),
  new THREE.MeshStandardMaterial({color:0x333333}));
 m.position.set(0,0.1,z);m.userData={name};s.add(m);return m;
}
const RW01=runway(0,"RW01");
const RW10=runway(-15,"RW10");

// taxiway
const taxi=new THREE.Mesh(new THREE.BoxGeometry(6,0.2,30),
 new THREE.MeshStandardMaterial({color:0x555555}));
taxi.position.set(20,0.1,-7.5);s.add(taxi);

// terminal
const term=new THREE.Mesh(new THREE.BoxGeometry(20,6,10),
 new THREE.MeshStandardMaterial({color:0x00aaff}));
term.position.set(25,3,-7.5);s.add(term);

// gates
const gates=[];
for(let i=0;i<6;i++){
 let g=new THREE.Mesh(new THREE.BoxGeometry(2,1,2),
  new THREE.MeshStandardMaterial({color:0x00ffcc}));
 g.position.set(30,0.5,-15+i*3);
 g.userData={name:"Gate B"+(i+1)};
 s.add(g);gates.push(g);
}

// simple plane
function plane(){
 const p=new THREE.Group();
 const body=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,6,12),
  new THREE.MeshStandardMaterial({color:0xffffff}));
 body.rotation.z=Math.PI/2;p.add(body);
 const wing=new THREE.Mesh(new THREE.BoxGeometry(3,.2,1),
  new THREE.MeshStandardMaterial({color:0xffffff}));
 p.add(wing);
 return p;
}

// planes states
const P1=plane();P1.position.set(-60,2,0);P1.userData={state:"takeoff"};s.add(P1);
const P2=plane();P2.position.set(60,3,-15);P2.userData={state:"landing"};s.add(P2);
const P3=plane();P3.position.set(25,1,-5);P3.userData={state:"taxi"};s.add(P3);

// animation
function step(p){
 if(p.userData.state==="takeoff"){
  p.position.x+=0.6;
  if(p.position.x>60){p.userData.state="landing";p.position.set(60,3,-15);}
 }
 if(p.userData.state==="landing"){
  p.position.x-=0.4;p.position.y-=0.02;
  if(p.position.x<10){p.userData.state="taxi";p.position.set(20,1,-10);}
 }
 if(p.userData.state==="taxi"){
  p.position.z+=0.1;
  if(p.position.z>0){p.userData.state="park";p.position.set(30,1,-6);}
 }
}

function animate(){
 requestAnimationFrame(animate);
 [P1,P2,P3].forEach(step);
 r.render(s,c);
}
animate();

// resize
onresize=()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight);}
</script>
</body></html>
