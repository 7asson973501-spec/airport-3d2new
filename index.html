<!DOCTYPE html><html><body style="margin:0">
<canvas id=c></canvas>
<script>
let x=c.getContext("2d"),t=0;

function draw(){
c.width=innerWidth;c.height=innerHeight;

// خلفية
x.fillStyle="#0a0a0a";
x.fillRect(0,0,c.width,c.height);

// ===== RUNWAY RW01 =====
x.fillStyle="#444";
x.fillRect(100,300,800,30);

// خط الوسط
x.strokeStyle="#fff";
x.setLineDash([20,15]);
x.beginPath();
x.moveTo(100,315);
x.lineTo(900,315);
x.stroke();

// ===== RUNWAY RW10 =====
x.fillStyle="#333";
x.fillRect(100,400,800,25);

// ===== TAXIWAYS =====
x.fillStyle="#666";
x.fillRect(300,330,20,70);
x.fillRect(600,330,20,70);

// ===== TERMINAL =====
x.fillStyle="#0af";
x.fillRect(350,200,200,80);

// ===== GATES =====
for(let i=0;i<5;i++){
x.fillStyle="#0ff";
x.fillRect(370+i*40,180,20,20);
}

// ===== CONTROL TOWER =====
x.fillStyle="#aaa";
x.fillRect(700,180,20,60);

// ===== PLANE (MOVING) =====
x.fillStyle="#fff";
x.beginPath();
x.moveTo(100+t,290);
x.lineTo(130+t,300);
x.lineTo(100+t,310);
x.closePath();
x.fill();

t+=3;
if(t>800)t=0;

requestAnimationFrame(draw);
}

draw();
</script></body></html>
