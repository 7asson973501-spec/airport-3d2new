<!DOCTYPE html>
<html>
<body style="margin:0">
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a1a2f);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// إضاءة
scene.add(new THREE.AmbientLight(0xffffff,0.8));

// أرضية
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshBasicMaterial({color:0x1a1a1a})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// RW01
const rw01=new THREE.Mesh(
 new THREE.BoxGeometry(250,1,20),
 new THREE.MeshBasicMaterial({color:0x333333})
);
scene.add(rw01);

// RW10
const rw10=new THREE.Mesh(
 new THREE.BoxGeometry(250,1,15),
 new THREE.MeshBasicMaterial({color:0x444444})
);
rw10.position.z=-50;
scene.add(rw10);

// Terminal
const terminal=new THREE.Mesh(
 new THREE.BoxGeometry(80,15,40),
 new THREE.MeshBasicMaterial({color:0x0077ff})
);
terminal.position.set(90,7,-10);
scene.add(terminal);

// بوابات B
let gatesB=[];
for(let i=0;i<5;i++){
 let g=new THREE.Mesh(
  new THREE.BoxGeometry(6,2,6),
  new THREE.MeshBasicMaterial({color:0x00ffff})
 );
 g.position.set(90+i*10,1,-40);
 scene.add(g);
 gatesB.push(g);
}

// بوابات M
let gatesM=[];
for(let i=0;i<4;i++){
 let g=new THREE.Mesh(
  new THREE.BoxGeometry(6,2,6),
  new THREE.MeshBasicMaterial({color:0xff00ff})
 );
 g.position.set(90+i*10,1,20);
 scene.add(g);
 gatesM.push(g);
}

// A1-A4
for(let i=0;i<4;i++){
 let a=new THREE.Mesh(
  new THREE.BoxGeometry(15,1,6),
  new THREE.MeshBasicMaterial({color:0x666666})
 );
 a.position.set(-120+i*30,0.5,-90);
 scene.add(a);
}

// T1 T2
let t1=new THREE.Mesh(new THREE.BoxGeometry(6,4,6),new THREE.MeshBasicMaterial({color:0xffff00}));
t1.position.set(-120,2,0);
scene.add(t1);

let t2=new THREE.Mesh(new THREE.BoxGeometry(6,4,6),new THREE.MeshBasicMaterial({color:0xffff00}));
t2.position.set(120,2,0);
scene.add(t2);

// ===== الطيارات =====
function createPlane(x,z){
 let p=new THREE.Mesh(
  new THREE.BoxGeometry(8,2,2),
  new THREE.MeshBasicMaterial({color:0xffffff})
 );
 p.position.set(x,3,z);
 p.state="landing";
 return p;
}

let planes=[createPlane(150,-50)];

// حركة الطيارات
function updatePlanes(){
 planes.forEach(p=>{
  if(p.state=="landing"){
    p.position.x-=0.6;
    if(p.position.x<0){
      p.state="taxi";
      p.targetZ=20;
    }
  }
  else if(p.state=="taxi"){
    p.position.z+=0.3;
    if(p.position.z>=20){
      p.state="park";
    }
  }
  else if(p.state=="park"){
    // توقف شوي ثم تقلع
    p.wait=(p.wait||0)+1;
    if(p.wait>200){
      p.state="takeoff";
    }
  }
  else if(p.state=="takeoff"){
    p.position.z=0;
    p.position.x+=0.8;
    if(p.position.x>150){
      p.position.set(150,-3,-50);
      p.state="landing";
      p.wait=0;
    }
  }
 });
}

// كاميرا
camera.position.set(0,180,220);
camera.lookAt(0,0,0);

// تشغيل
function animate(){
 requestAnimationFrame(animate);
 updatePlanes();
 renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
