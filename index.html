<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:black;overflow:hidden}
#map{
  position:relative;
  width:100%;
  height:100vh;
}
#map img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.plane{
  position:absolute;
  width:14px;
  height:14px;
  background:red;
  border-radius:50%;
}
</style>
</head>

<body>

<div id="map">

<!-- الصورة مدمجة هنا -->
<img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...">

<div id="plane" class="plane"></div>

</div>

<script>
let plane=document.getElementById("plane");

let path=[
  {x:90,y:50},
  {x:80,y:50},
  {x:70,y:55},
  {x:60,y:60},
  {x:50,y:60},
  {x:40,y:55},
  {x:30,y:50},
  {x:20,y:50}
];

let i=0;

function move(){
  let p=path[i];
  plane.style.left=p.x+"%";
  plane.style.top=p.y+"%";

  i++;
  if(i>=path.length)i=0;

  setTimeout(move,400);
}

move();
</script>

</body>
</html>
